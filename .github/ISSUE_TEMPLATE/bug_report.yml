name: Bug report
description: Something didn't work as expected
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What did you do, and what went wrong?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The exact command or code, the task you gave, and the site if relevant.
      placeholder: |
        pixelpi "..."
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: pixelpi version (`pixelpi --version`), Node version, OS, model/provider.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Re-run with `PIXELPI_DEBUG=1` and paste the relevant output. Redact any secrets.
      render: shell
