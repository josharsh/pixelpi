name: Feature request
description: Suggest an idea or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Start with the use case, not the solution.
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: What would you like pixelpi to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Can this be done today with `eval` or a skill? What's missing?
